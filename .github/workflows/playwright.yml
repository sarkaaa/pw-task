name: Playwright Tests
on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  playwright:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Medusa Tests
            id: medusa
            project: --project=chromium --project=iphone
          - name: OAuth Tests
            id: oauth
            project: --project=oAuth
    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}
      BASE_URL: ${{ vars.BASE_URL }}
      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
      AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
      AUTH0_USERNAME: ${{ secrets.AUTH0_USERNAME }}
      AUTH0_PASSWORD: ${{ secrets.AUTH0_PASSWORD }}
      AUTH0_REDIRECT_URI: ${{ secrets.AUTH0_REDIRECT_URI }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm and cache dependencies
        uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run tests
        id: test-run
        run: |
          pnpm exec playwright test ${{ matrix.project }}
          EXIT=$?
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          exit $EXIT

      - name: Test results
        env:
          EXIT_CODE: ${{ steps.test-run.outputs.exit_code }}
        run: |
          if [ "$EXIT_CODE" = "0" ]; then
            echo "Tests passed successfully ✅"
          else
            echo "Tests failed ❌"
          fi
          exit $EXIT_CODE

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.id }}
          path: playwright-report/
          retention-days: 30
