name: Playwright Tests
on:
  push:
    branches: [master]
  pull_request:
jobs:
  playwright:
    name: "E2E Tests"
    runs-on: ubuntu-latest
    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}
      BASE_URL: ${{ vars.BASE_URL }}
      TOKEN: ${{ secrets.TOKEN }}
    steps:
      - name: Checkout and clone the repository
        uses: actions/checkout@v6

      - name: Install pnpm and cache dependencies
        uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run your tests
        id: test-run
        run: pnpm exec playwright test

      - name: Test summary
        if: always()
        run: |
          if [ "${{ steps.test-run.outcome }}" = "success" ]; then
            echo "Tests passed successfully. ✅"
          else
            echo "Tests failed. ⛔️"
          fi

      - name: Generate Allure report
        if: always() && !cancelled()
        run: |
          if [ -d allure-results ] && [ -n "$(ls -A allure-results 2>/dev/null)" ]; then
            pnpm allure:generate
          else
            echo "No allure-results ⛔️; skipping Allure generate."
          fi

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
          if-no-files-found: ignore
